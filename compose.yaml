version: '3.8'

services:
  # --- NESTJS API SERVICE ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nest-api
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
      - minio
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: package.json

  # --- POSTGRES DATABASE SERVICE ---
  db:
    image: postgres:15-alpine
    container_name: nest_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- MINIO STORAGE SERVICE ---
  minio:
    image: minio/minio:latest
    container_name: nest_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"  # API port
      - "9001:9001"  # Console port
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # --- MINIO CLIENT SETUP (Optional - for automatic bucket creation) ---
  minio-setup:
    image: minio/mc:latest
    container_name: nest_minio_setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb myminio/${AWS_S3_BUCKET:-nest-uploads} --ignore-existing;
      /usr/bin/mc policy set public myminio/${AWS_S3_BUCKET:-nest-uploads};
      exit 0;
      "

volumes:
  postgres_data:
  minio_data: